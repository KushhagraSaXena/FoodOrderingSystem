version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: food_sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Food@12345"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  web:
    build:
      context: .
      dockerfile: FoodOrdering.Web/Dockerfile
    container_name: foodordering-web
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FoodOrderingDB;User Id=sa;Password=Food@12345;TrustServerCertificate=True"
    ports:
      - "8081:8080"
    depends_on:
      - sqlserver

  api:
    build:
      context: .
      dockerfile: FoodOrdering.API/Dockerfile
    container_name: foodordering-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=FoodOrderingDB;User Id=sa;Password=Food@12345;TrustServerCertificate=True"
    ports:
      - "8082:8080"
    depends_on:
      - sqlserver

volumes:
  sql_data:
